<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="output.css">
  <title>Product List With Cart || HTML & TailWindCSS & Vanilla JS</title>
</head>

<body class="min-h-screen flex flex-col items-center gap-4 p-6 font-redhat text-b-Rose-300 bg-b-Rose-100">
  <main class="w-full flex flex-col lg:flex-row gap-8 md:w-[90%] items-baseline">

    <section class="w-full md:flex-2 flex flex-col gap-4">
      <h1 class="text-5xl font-bold text-b-Rose-900">Desserts</h1>

      <div class="group w-full grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 justify-items-center"
        id="dessert-list">
      </div>

    </section>

    <section class="group w-full md:flex-1 flex flex-col gap-4 bg-b-Rose-50 p-4 rounded-md" id="biel-sec">
      <h2 class="text-3xl font-bold text-b-Red">
        Your Cart (<span id="tq">0</span>)
      </h2>

      <div class="flex group-[.active]:hidden flex-col gap-4 items-center">
        <img src="images/illustration-empty-cart.svg">
        <p class="text-b-Rose-300 font-semibold">Your added items will appear here</p>
      </div>

      <div class="hidden group-[.active]:flex flex-col gap-5 divide-y divide-b-Rose-100">
        <ul class="p-4 divide-y divide-b-Rose-300 " id="order-active-list">
        </ul>

        <div class="py-4 flex flex-col gap-4">
          <div class="flex justify-between">
            <span>Order Total</span>
            <p class=" text-b-Rose-900 font-bold text-2xl">
              $<span class="total"></span>
            </p>
          </div>

          <div class="p-4 rounded-md flex gap-2 justify-center items-center bg-b-Rose-100 text-b-Rose-900">
            <img src="./images/icon-carbon-neutral.svg" alt="carbon neutral icon">
            <p>This is <span class="font-semibold">carbon-neutral</span>delivery</p>
          </div>

          <button type="button" aria-label="click confirm order"
            class="w-full p-4 rounded-full bg-b-Red text-b-Rose-50 transition cursor-pointer hover:bg-b-Rose-900"
            id="confirm-btn">
            Confirm Order
          </button>
        </div>
      </div>

      <div id="overlay"
        class="hidden group-[.confirm]:flex fixed inset-0 z-50 bg-black/50 items-end md:items-center justify-center overflow-y-auto p-0 md:p-4">

        <div
          class="w-full max-h-[90vh] flex flex-col gap-6 bg-b-Rose-50 p-6 rounded-t-4xl md:rounded-xl md:max-w-135 overflow-y-auto"
          id="confirm-modal">

          <img src="./images/icon-order-confirmed.svg" alt="order confirmed icon" class="w-12 h-12">
          <h2 class="text-4xl font-bold text-b-Rose-900 leading-tight">Order Confirmed</h2>
          <p class="text-b-Rose-400 text-sm">We hope you enjoy your food!</p>

          <div class="p-6 flex flex-col gap-6 bg-b-Rose-100 rounded-lg">
            <ul class="divide-y divide-b-Rose-300 max-h-65 overflow-y-auto pr-1 min-w-0" id="order-confirm-list">
            </ul>

            <div class="flex justify-between items-center pt-5 border-t border-b-Rose-300">
              <span class="text-b-Rose-500 text-sm">Order Total</span>
              <p class="text-b-Rose-900 font-bold text-2xl">$<span class="total">0.00</span></p>
            </div>
          </div>

          <button type="button"
            class="w-full p-4 rounded-full bg-b-Red text-b-Rose-50 font-semibold cursor-pointer hover:bg-b-Rose-900"
            id="start-btn">
            Start New Order
          </button>

        </div>
      </div>
    </section>
  </main>
  <footer class="hidden md:flex items-center justify-center gap-2 p-4 text-lg">
    <img src="images/Logo.jpeg" alt="OriginB Official Logo" class="rounded-full w-9">
    <p>
      Coded by
      <a href="https://github.com/Origin-B" target="_blank" rel="noopener noreferrer"
        class="text-b-Rose-500 font-bold transition-colors hover:text-b-Green">
        OriginB
      </a>.
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer"
        class="text-b-Rose-500 font-bold transition-colors hover:text-b-Green">
        Frontend Mentor
      </a>.
    </p>
  </footer>
  <script src="index.js"></script>
</body>

</html>
